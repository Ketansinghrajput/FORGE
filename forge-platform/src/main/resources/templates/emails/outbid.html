<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #1a1a1a;
            border: 1px solid #d4af37;
            padding: 40px;
            text-align: center;
        }
        .header {
            color: #d4af37;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .item-box {
            background-color: #252525;
            border-left: 4px solid #ff4d4d;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .new-price {
            color: #ff4d4d;
            font-size: 28px;
            font-weight: bold;
        }
        .btn {
            display: inline-block;
            background-color: #d4af37;
            color: #000 !important;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 30px;
            text-transform: uppercase;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">Forge Fine Auctions</div>

    <p>Sensei, your bid has been topped!</p>

    <div class="item-box">
        <h3 style="margin: 0; color: #d4af37;" th:text="${title}">Auction Item Name</h3>
        <p style="margin: 10px 0 0 0;">New Highest Bid:</p>
        <div class="new-price">₹<span th:text="${newPrice}">0.00</span></div>
    </div>

    <p>Don't lose this masterpiece. Strike back now!</p>

    <a href="http://localhost:4200/auctions" class="btn">Place a Higher Bid</a>

    <div class="footer">
        Sent via Forge Platform Notification Engine.<br>
        © 2026 Forge Fine Auctions.
    </div>
</div>
</body>
</html>
