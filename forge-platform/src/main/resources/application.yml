spring:
  application:
    name: forge-platform
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/forge_db
    username: postgres
    password: sensei
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # SENSEI: 'create-drop' se data ud jayega har baar, 'update' use kar for now
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      fail-on-empty-beans: false

  flyway:
    enabled: false

# ✅ LOGGING CONFIG: Taaki Security aur SQL clear dikhe
logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    com.forge.platform: DEBUG

# ✅ JWT CONFIG
application:
  security:
    jwt:
      # Minimum 256-bit key (Base64 encoded)
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000 # 24 Hours