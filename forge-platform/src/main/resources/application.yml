spring:
  application:
    name: forge-platform
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/forge_db
    username: forge_user
    password: forge_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379