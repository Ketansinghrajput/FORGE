spring:
  application:
    name: forge-platform
  profiles:
    active: dev

  # 🔥 SENSEI FIX: Added Multipart config to bypass 1MB default upload limit
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # 📧 EMAIL CONFIG (Mailhog setup for Phase 3 Notifications)
  mail:
    host: localhost
    port: 1025                 # Mailhog SMTP port
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  # 🎨 THYMELEAF CONFIG (For HTML Email Templates)
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false               # Dev mode mein cache false rakha hai taaki UI changes turant dikhein

  #   DATABASE CONFIG
  datasource:
    url: jdbc:postgresql://localhost:5432/forge_db
    username: postgres
    password: sensei
    driver-class-name: org.postgresql.Driver

  #   JPA / HIBERNATE CONFIG
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata

  #   JACKSON SERIALIZATION
  jackson:
    serialization:
      fail-on-empty-beans: false

  #   FLYWAY
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  #   REDIS
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  #   QUARTZ
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

#   LOGGING
logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    com.forge.platform: DEBUG

#   APPLICATION SECURITY & JWT
application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000

minio:
  endpoint: http://localhost:9000
  access-key: sensei
