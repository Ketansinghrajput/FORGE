spring:
  application:
    name: forge-platform
  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:forgedb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    driverClassName: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: false

  flyway:
    enabled: false

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000