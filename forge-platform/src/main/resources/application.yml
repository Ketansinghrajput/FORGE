spring:
  application:
    name: forge-platform
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: sensei
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ✅ CORRECT JACKSON CONFIG
  jackson:
    serialization:
      fail-on-empty-beans: false

  flyway:
    enabled: false

