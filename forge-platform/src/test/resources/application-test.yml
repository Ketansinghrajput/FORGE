spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/forge_db
    username: postgres
    password: sensei
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  mail:
    host: localhost
    port: 1025
  data:
    redis:
      host: localhost
      port: 6379