version: '3.9'

services:
  # 🚀 FORGE PLATFORM: The Spring Boot Application
  forge-app:
    build: .
    container_name: forge-platform-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/forge_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=sensei
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=sensei
      - MINIO_SECRET_KEY=sensei123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forge-net

  # 🐘 POSTGRES: Database for Forge Platform
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    environment:
      POSTGRES_DB: forge_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sensei
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d forge_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - forge_db_data:/var/lib/postgresql/data
    networks:
      - forge-net

  # 🔴 REDIS: Distributed Cache (L2)
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "6379:6379"
    networks:
      - forge-net

  # 📦 MINIO: S3-Compatible Image Storage
  minio:
    image: minio/minio
    container_name: minio-forge
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # UI Console Port
    environment:
      MINIO_ROOT_USER: sensei
      MINIO_ROOT_PASSWORD: sensei123
    volumes:
      - forge_minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - forge-net

  # 📧 MAILHOG: Dev Email Server (Phase 3 Notifications)
  mailhog:
    image: mailhog/mailhog
    container_name: mailhog-forge
    ports:
      - "1025:1025" # SMTP Port
      - "8025:8025" # Web UI Port
    networks:
      - forge-net

networks:
  forge-net:
    driver: bridge

volumes:
  forge_db_data:
  forge_minio_data: