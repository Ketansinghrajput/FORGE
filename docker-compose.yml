version: '3.9'

services:
  # 🐘 POSTGRES: Database for Forge Platform
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    environment:
      POSTGRES_DB: forge_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sensei
    ports:
      - "5432:5432"
    networks:
      - forge-net

  # 🔴 REDIS: Distributed Cache (L2)
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "6379:6379"
    networks:
      - forge-net

  # 📦 MINIO: S3-Compatible Image Storage
  minio:
    image: minio/minio
    container_name: minio-forge
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # UI Console Port[cite: 1]
    environment:
      MINIO_ROOT_USER: sensei
      MINIO_ROOT_PASSWORD: sensei123
    command: server /data --console-address ":9001"
    networks:
      - forge-net

  # 📧 MAILHOG: Dev Email Server (Phase 3 Notifications)[cite: 1]
  mailhog:
    image: mailhog/mailhog
    container_name: mailhog-forge
    ports:
      - "1025:1025" # SMTP Port[cite: 1]
      - "8025:8025" # Web UI Port[cite: 1]
    networks:
      - forge-net

networks:
  forge-net:
    driver: bridge